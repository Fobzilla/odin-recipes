<!DOCTYPE html>
<html lang="en">

    <title>Cheese and Ham Toastie</title>

<body>
    <h1>Cheese and Ham Toastie</h1>
    <img src="../pictures/chtoast.jpg" alt="A picture of a cheese and ham toastie" width="200">
    <p>The classic lunch on the go</p>
    <p></p>
    <h2>Ingredients</h2>
    <ul>
        <li>Bread</li>
        <li>Butter</li>
        <li>Cheese</li>
        <li>Tomato</li>
    </ul>
    <h2>Steps</h2>
    <ol>
        <li>Butter bread both sides</li>
        <li>Add cheese and tomato and sandwich between the bread slices</li>
        <li>Place sandwich in toastie maker for 5-7mins</li>
        <li>Serve!</li>
    </ol>

</body>
