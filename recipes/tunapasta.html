    <h2>Ingredients</h2>
    <ul>
        <li>Tuna</li>
        <li>Pasta</li>
        <li>Cheese</li>
        <li>Optional: Chilli crisp oil</li>
    </ul>

    <ol>
        <li>Cook pasta to al-dente</li>
        <li>strain tuna</li>
